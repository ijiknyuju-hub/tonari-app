name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description for Codex'
        required: true
        type: string
      model:
        description: 'Codex model (o4-mini / gpt-4o)'
        required: false
        default: 'o4-mini'
        type: string
      branch:
        description: 'Branch to work on'
        required: false
        default: 'sekaishi-chizu'
        type: string

jobs:
  codex:
    runs-on: [self-hosted, local-codex]
    timeout-minutes: 20

    env:
      NPM_BIN: C:\Users\ito junki\AppData\Roaming\npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add npm bin to PATH
        shell: powershell
        run: |
          $npmBin = "C:\Users\ito junki\AppData\Roaming\npm"
          Write-Host "Adding to PATH: $npmBin"
          "$npmBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $codexCmd = Join-Path $npmBin 'codex.cmd'
          if (Test-Path $codexCmd) {
            Write-Host "Found: $codexCmd"
          } else {
            Write-Host "WARNING: codex.cmd not found at $codexCmd"
            Get-ChildItem $npmBin | Select-Object Name
          }

      - name: Run Codex
        shell: powershell
        run: |
          codex exec -m ${{ inputs.model }} --sandbox workspace-write "${{ inputs.task }}"

      - name: Commit and push
        shell: powershell
        run: |
          git config user.name "Codex Bot"
          git config user.email "codex@local"
          git add -A
          $diff = git diff --staged --stat
          if ($diff) {
            Write-Host $diff
            git commit -m "feat(codex): ${{ inputs.task }}"
            git push origin ${{ inputs.branch }}
          } else {
            Write-Host "No changes to commit"
          }
