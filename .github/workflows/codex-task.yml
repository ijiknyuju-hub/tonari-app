name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description for Codex'
        required: true
        type: string
      branch:
        description: 'Branch to work on'
        required: false
        default: 'sekaishi-chizu'
        type: string

jobs:
  codex:
    runs-on: [self-hosted, local-codex]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Verify codex
        shell: powershell
        run: |
          $codexPath = (where.exe codex 2>$null) | Select-Object -First 1
          if (-not $codexPath) {
            Write-Error "codex not found in PATH. Run: npm install -g @openai/codex"
            exit 1
          }
          Write-Host "codex found: $codexPath"
          codex --version

      - name: Run Codex
        shell: powershell
        env:
          CODEX_TASK: ${{ inputs.task }}
        run: |
          $ErrorActionPreference = 'Continue'
          $outFile = Join-Path $env:GITHUB_WORKSPACE "codex-output.txt"
          Write-Host "=== Task ==="
          Write-Host $env:CODEX_TASK
          Write-Host "============"
          & codex exec --sandbox workspace-write $env:CODEX_TASK 2>&1 |
            Tee-Object -FilePath $outFile
          $ec = $LASTEXITCODE
          Write-Host "codex exit code: $ec"
          if ($ec -ne 0) { exit $ec }

      - name: Capture git status and diff
        shell: powershell
        if: always()
        run: |
          $statusFile = Join-Path $env:GITHUB_WORKSPACE "git-status.txt"
          $diffFile   = Join-Path $env:GITHUB_WORKSPACE "git-diff.txt"
          Write-Host "=== git status ==="
          git status --short | Tee-Object -FilePath $statusFile
          Write-Host "=== git diff ==="
          git diff HEAD | Tee-Object -FilePath $diffFile

      - name: Commit and push
        shell: powershell
        env:
          COMMIT_BRANCH: ${{ inputs.branch }}
        run: |
          git config user.name "Codex Bot"
          git config user.email "codex@local"
          git add -A
          $staged = git diff --staged --stat
          if ($staged) {
            Write-Host "Changes:"
            Write-Host $staged
            # Use run number in message to avoid special chars from task input
            $msg = "codex: implement changes (run $env:GITHUB_RUN_NUMBER)"
            git commit -m $msg
            git push origin $env:COMMIT_BRANCH
            Write-Host "Pushed to $env:COMMIT_BRANCH"
          } else {
            Write-Host "No changes to commit"
          }

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codex-results-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/codex-output.txt
            ${{ github.workspace }}/git-status.txt
            ${{ github.workspace }}/git-diff.txt
