name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description for Codex'
        required: true
        type: string
      model:
        description: 'Codex model (o4-mini / gpt-4o)'
        required: false
        default: 'o4-mini'
        type: string
      branch:
        description: 'Branch to work on'
        required: false
        default: 'sekaishi-chizu'
        type: string

jobs:
  codex:
    runs-on: [self-hosted, local-codex]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find codex path
        shell: powershell
        run: |
          $codexPath = (Get-Command codex -ErrorAction SilentlyContinue).Source
          if (-not $codexPath) {
            $npmGlobal = npm root -g 2>$null
            $npmBin = Split-Path $npmGlobal
            $codexPath = Join-Path $npmBin 'codex.cmd'
            if (Test-Path $codexPath) {
              "$npmBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "Added $npmBin to PATH"
            } else {
              Write-Host "Trying AppData npm path..."
              $appDataNpm = "$env:APPDATA\npm"
              "$appDataNpm" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          } else {
            Write-Host "codex found at: $codexPath"
          }

      - name: Run Codex
        shell: powershell
        run: |
          Write-Host "PATH: $env:PATH"
          codex exec -m ${{ inputs.model }} --sandbox workspace-write "${{ inputs.task }}"

      - name: Commit and push
        shell: powershell
        run: |
          git config user.name "Codex Bot"
          git config user.email "codex@local"
          git add -A
          $diff = git diff --staged --stat
          if ($diff) {
            Write-Host $diff
            git commit -m "feat(codex): ${{ inputs.task }}"
            git push origin ${{ inputs.branch }}
            Write-Host "Changes pushed to ${{ inputs.branch }}"
          } else {
            Write-Host "No changes to commit"
          }
