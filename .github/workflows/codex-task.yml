name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description for Codex'
        required: true
        type: string
      branch:
        description: 'Branch to work on'
        required: false
        default: 'sekaishi-chizu'
        type: string

jobs:
  codex:
    runs-on: [self-hosted, local-codex]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify codex
        shell: powershell
        run: |
          $codexPath = (where.exe codex 2>$null) | Select-Object -First 1
          if (-not $codexPath) {
            Write-Error "codex not found in PATH. Run: npm install -g @openai/codex"
            exit 1
          }
          Write-Host "codex found: $codexPath"
          codex --version

      - name: Run Codex
        shell: powershell
        env:
          CODEX_TASK: ${{ inputs.task }}
        run: |
          Write-Host "=== Task ==="
          Write-Host $env:CODEX_TASK
          Write-Host "============"

          # Pipe task via stdin to avoid shell injection
          # ChatGPT subscription auth is read automatically from ~/.codex/auth.json
          $env:CODEX_TASK | codex exec --sandbox workspace-write - 2>&1 |
            Tee-Object -FilePath codex-output.txt

          Write-Host "codex exit code: $LASTEXITCODE"

      - name: Capture git status and diff
        shell: powershell
        if: always()
        run: |
          Write-Host "=== git status ==="
          git status --short | Tee-Object -FilePath git-status.txt

          Write-Host "=== git diff ==="
          git diff HEAD | Tee-Object -FilePath git-diff.txt

      - name: Commit and push
        shell: powershell
        run: |
          git config user.name "Codex Bot"
          git config user.email "codex@local"
          git add -A
          $staged = git diff --staged --stat
          if ($staged) {
            Write-Host "Changes:"
            Write-Host $staged
            git commit -m "codex: ${{ inputs.task }}"
            git push origin ${{ inputs.branch }}
            Write-Host "Pushed to ${{ inputs.branch }}"
          } else {
            Write-Host "No changes to commit"
          }

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codex-results-${{ github.run_number }}
          path: |
            codex-output.txt
            git-status.txt
            git-diff.txt
